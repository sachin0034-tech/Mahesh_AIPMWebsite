name: Build and deploy Node.js app to Azure Web App - myaipm-backendpipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build TypeScript
        working-directory: ./server
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'myaipm-backendpipeline'
          slot-name: 'Production'
          package: ./server
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6D5FB849D66149D881A11E5E64EC8061 }}
